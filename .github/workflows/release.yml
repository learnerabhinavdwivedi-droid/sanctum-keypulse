name: Build and Release Sanctum KeyPulse

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Web Frontend Assets
        run: |
          npm install
          npm run build --if-present

      - name: Compile Cross-Platform Binaries Globally
        run: |
          # Install pkg globally so it works anywhere
          npm install -g pkg
          
          # Move to the binary folder and build
          cd executas/keypulse-tools-node
          npm install --omit=dev || npm install
          
          # Compile explicitly targeting standard outputs
          pkg . --targets node18-linux-x64,node18-macos-arm64,node18-win-x64 --out-path dist/

      - name: Create Distribution Archives
        run: |
          cd executas/keypulse-tools-node/dist
          tar -czf ../../../keypulse-linux-x64.tar.gz *linux* || tar -czf ../../../keypulse-linux-x64.tar.gz .
          tar -czf ../../../keypulse-macos-arm64.tar.gz *macos* || tar -czf ../../../keypulse-macos-arm64.tar.gz .
          zip -j ../../../keypulse-windows-x64.zip *win* || zip -j ../../../keypulse-windows-x64.zip .

      - name: Upload Assets to Release Page
        uses: softprops/action-gh-release@v1
        with:
          files: |
            keypulse-linux-x64.tar.gz
            keypulse-macos-arm64.tar.gz
            keypulse-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
