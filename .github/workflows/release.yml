name: Build and Release Sanctum KeyPulse

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Handle Root Build
        run: |
          npm install
          npm run build --if-present

      - name: Build and Package Executa Binaries
        uses: subgraph/pkg-action@v1
        with:
          working-directory: 'executas/keypulse-tools-node'
          options: '--targets node18-linux-x64,node18-macos-arm64,node18-win-x64 --out-path dist/'

      - name: Archive Target Distributions
        run: |
          cd executas/keypulse-tools-node/dist
          
          # Zip the specific output variants
          tar -czf ../../../keypulse-linux-x64.tar.gz *linux*
          tar -czf ../../../keypulse-macos-arm64.tar.gz *macos*
          zip -j ../../../keypulse-windows-x64.zip *win*.exe || zip -j ../../../keypulse-windows-x64.zip *

      - name: Create Cloud Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            keypulse-linux-x64.tar.gz
            keypulse-macos-arm64.tar.gz
            keypulse-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
