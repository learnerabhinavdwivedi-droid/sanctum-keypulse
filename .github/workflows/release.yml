name: Build and Release Sanctum KeyPulse

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install and Compile Executa Binaries
        run: |
          cd executas/keypulse-tools-node
          npm install
          npx pkg . --targets node18-linux-x64,node18-macos-arm64,node18-win-x64

      - name: Compress Outputs
        run: |
          cd executas/keypulse-tools-node
          tar -czf ../../keypulse-linux-x64.tar.gz *linux*
          tar -czf ../../keypulse-macos-arm64.tar.gz *macos*
          zip -j ../../keypulse-windows-x64.zip *win*

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            keypulse-linux-x64.tar.gz
            keypulse-macos-arm64.tar.gz
            keypulse-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
