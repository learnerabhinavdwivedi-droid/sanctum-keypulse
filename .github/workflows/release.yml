name: Build and Release Sanctum KeyPulse

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build and Package
        run: |
          cd executas/keypulse-tools-node
          npm install --no-audit
          npx pkg . --targets node18-linux-x64,node18-macos-arm64,node18-win-x64 --out-path dist
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: executas/keypulse-tools-node/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
